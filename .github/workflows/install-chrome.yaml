name: docker-image

on:
  push:
    branches:
    # Using arbitary branch name to avoid running whenever code is pushed
      # - main
      - chrome

jobs:
  chrome:
    runs-on: ubuntu-latest


    steps:
    - uses: browser-actions/setup-chrome@latest
    - run: chrome --version
    - uses: actions/setup-node@v2
      with:
        node-version: '14'
    - run: node --version

        